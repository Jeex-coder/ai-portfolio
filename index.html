<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Portfolio ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose:    #f9c6d0;
    --peach:   #fddcc4;
    --mint:    #c6f0e0;
    --sky:     #c4e4fd;
    --lavender:#ddc6f9;
    --butter:  #fdf5c4;
    --blush:   #fde8f0;
    --bg:      #fdf8fb;
    --text:    #5a4a5a;
    --muted:   #b8a8c0;
    --card-bg: rgba(255,255,255,0.72);
    --shadow:  0 8px 32px rgba(180,140,200,0.13);
    --radius:  22px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
    user-select: none;
  }

  /* ─── MAGICAL BACKGROUND ─── */
  .bg-canvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, #fddcc433 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 80% 20%, #ddc6f933 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 50% 90%, #c6f0e022 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 90% 60%, #f9c6d022 0%, transparent 60%),
      var(--bg);
  }

  /* ─── SPARKLE CANVAS ─── */
  #sparkle-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  /* ─── BUTTERFLY SVG FLOATERS ─── */
  .butterfly {
    position: fixed; z-index: 2; pointer-events: none;
    animation: butterflyFloat linear infinite;
    opacity: 0;
  }
  @keyframes butterflyFloat {
    0%   { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0; }
    5%   { opacity: 0.7; }
    50%  { transform: translate(var(--dx), var(--dy)) rotate(var(--dr)) scale(var(--ds)); }
    95%  { opacity: 0.5; }
    100% { transform: translate(var(--dx2), var(--dy2)) rotate(var(--dr2)) scale(1); opacity: 0; }
  }
  .wing-l, .wing-r {
    animation: wingFlap 0.35s ease-in-out infinite alternate;
    transform-origin: center;
  }
  .wing-r { animation-direction: alternate-reverse; }
  @keyframes wingFlap {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0.35); }
  }

  /* ─── LAYOUT ─── */
  .wrapper { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 0 28px 80px; }

  /* ─── HEADER ─── */
  header {
    text-align: center;
    padding: 64px 0 44px;
    position: relative;
  }
  .crown-emoji { font-size: 2.6rem; display: block; margin-bottom: 10px; animation: floatBob 3s ease-in-out infinite; }
  @keyframes floatBob {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #d48aaa 0%, #9b6fc2 40%, #6aabcc 80%, #70c2a0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }
  header p {
    margin-top: 12px;
    font-size: 1rem;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.5px;
  }
  .header-line {
    display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 22px;
  }
  .pill-tag {
    background: var(--card-bg);
    border: 1.5px solid rgba(200,170,230,0.35);
    border-radius: 99px;
    padding: 5px 16px;
    font-size: 0.78rem;
    color: #a080c0;
    backdrop-filter: blur(8px);
    box-shadow: 0 2px 10px rgba(180,140,210,0.1);
    letter-spacing: 0.4px;
  }

  /* ─── FILTER TABS ─── */
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center;
    margin-bottom: 36px;
  }
  .filter-btn {
    background: var(--card-bg);
    border: 1.5px solid rgba(200,170,230,0.3);
    border-radius: 99px;
    padding: 8px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.25s;
    backdrop-filter: blur(8px);
  }
  .filter-btn:hover { border-color: #d48aaa; color: #c070a0; transform: translateY(-1px); }
  .filter-btn.active {
    background: linear-gradient(135deg, #f9c6d0, #ddc6f9);
    border-color: transparent;
    color: #8050a0;
    font-weight: 500;
    box-shadow: 0 4px 16px rgba(180,140,210,0.2);
  }

  /* ─── GRID ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 22px;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    border: 1.5px solid rgba(220,190,240,0.35);
    box-shadow: var(--shadow);
    backdrop-filter: blur(12px);
    overflow: hidden;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
    position: relative;
    animation: cardIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.88) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .card:hover {
    transform: translateY(-6px) scale(1.015);
    box-shadow: 0 18px 48px rgba(180,140,200,0.22);
  }
  .card.hidden-card { opacity: 0.42; filter: grayscale(0.5); }
  .card.hidden-card:hover { opacity: 0.6; }

  /* card top colour band */
  .card-band {
    height: 6px;
    border-radius: 99px 99px 0 0;
  }

  /* PREVIEW ZONE — screenshot/embed area */
  .card-preview {
    position: relative;
    height: 160px;
    overflow: hidden;
    background: #f5eef8;
    display: flex; align-items: center; justify-content: center;
  }
  .card-preview img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.4s ease;
    display: block;
  }
  .card:hover .card-preview img { transform: scale(1.06); }

  /* No-image placeholder */
  .preview-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px;
    background: linear-gradient(135deg, #fde8f0 0%, #f0e8fd 100%);
  }
  .preview-placeholder .emoji { font-size: 2.4rem; }
  .preview-placeholder span { font-size: 0.72rem; color: var(--muted); }

  /* LOCK overlay — prevents right-click save / drag */
  .preview-lock {
    position: absolute; inset: 0;
    z-index: 5;
    cursor: pointer;
  }

  /* BADGE */
  .card-badge {
    position: absolute; top: 10px; right: 10px; z-index: 6;
    background: rgba(255,255,255,0.88);
    border-radius: 99px;
    padding: 3px 12px;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(200,170,230,0.4);
  }

  /* CARD BODY */
  .card-body { padding: 16px 18px 18px; }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: #6a4a7a;
    margin-bottom: 5px;
    line-height: 1.3;
  }
  .card-desc {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 13px;
    gap: 8px;
  }
  .card-tag {
    font-size: 0.68rem;
    border-radius: 99px;
    padding: 3px 11px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  /* CARD ACTIONS */
  .card-actions { display: flex; gap: 6px; }
  .btn-icon {
    width: 30px; height: 30px;
    border-radius: 99px;
    border: 1.5px solid rgba(200,170,230,0.4);
    background: rgba(255,255,255,0.7);
    cursor: pointer;
    font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    color: var(--muted);
  }
  .btn-icon:hover { background: #f9c6d0; border-color: #e8a0c0; color: #c05080; transform: scale(1.12); }
  .btn-icon.danger:hover { background: #ffd0d0; border-color: #e09090; color: #c04040; }

  /* ─── ADD CARD (dashed) ─── */
  .card-add {
    border: 2px dashed rgba(200,170,230,0.5);
    background: rgba(253,240,250,0.5);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; cursor: pointer; min-height: 280px;
    transition: all 0.3s;
    animation: cardIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  }
  .card-add:hover {
    border-color: #d48aaa;
    background: rgba(249,198,208,0.15);
    transform: scale(1.02);
  }
  .add-icon {
    width: 52px; height: 52px;
    border-radius: 99px;
    background: linear-gradient(135deg, #f9c6d0, #ddc6f9);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; color: #9060b0;
    box-shadow: 0 4px 16px rgba(180,140,210,0.25);
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  .card-add:hover .add-icon { transform: rotate(90deg) scale(1.1); }
  .card-add span { font-size: 0.82rem; color: var(--muted); }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(90,60,100,0.35);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: rgba(255,252,255,0.96);
    border-radius: 28px;
    padding: 36px 32px;
    max-width: 480px; width: 90%;
    box-shadow: 0 24px 72px rgba(140,100,180,0.25);
    border: 1.5px solid rgba(220,190,240,0.5);
    animation: modalIn 0.35s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.88) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; color: #7050a0;
    margin-bottom: 22px;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    background: rgba(245,235,255,0.6);
    border: 1.5px solid rgba(200,170,230,0.4);
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: #c090e0;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }
  .btn-cancel {
    padding: 9px 22px; border-radius: 99px;
    border: 1.5px solid rgba(200,170,230,0.4);
    background: transparent; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; color: var(--muted);
    transition: all 0.2s;
  }
  .btn-cancel:hover { background: #f9e8f0; color: #c070a0; }
  .btn-save {
    padding: 9px 26px; border-radius: 99px;
    border: none;
    background: linear-gradient(135deg, #f9c6d0, #ddc6f9);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; font-weight: 500;
    color: #7050a0;
    transition: all 0.25s;
    box-shadow: 0 4px 16px rgba(180,140,210,0.25);
  }
  .btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(180,140,210,0.35); }

  /* PREVIEW MODAL */
  .preview-modal {
    background: rgba(255,252,255,0.97);
    border-radius: 28px;
    padding: 28px;
    max-width: 900px; width: 95%;
    max-height: 90vh;
    display: flex; flex-direction: column;
    box-shadow: 0 24px 72px rgba(140,100,180,0.25);
    border: 1.5px solid rgba(220,190,240,0.5);
    animation: modalIn 0.35s cubic-bezier(.34,1.56,.64,1);
  }
  .preview-modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; flex-shrink: 0; }
  .preview-modal-header h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #7050a0; }
  .preview-modal-img {
    width: 100%; max-height: 340px; object-fit: contain;
    border-radius: 16px;
    background: linear-gradient(135deg, #fde8f0, #f0e8fd);
    display: block;
    user-select: none; -webkit-user-drag: none;
    pointer-events: none;
  }
  /* LIVE DEMO iframe */
  .demo-iframe-wrap {
    flex: 1; min-height: 0;
    border-radius: 16px; overflow: hidden;
    border: 1.5px solid rgba(200,170,230,0.3);
    position: relative;
    background: #f5f3ef;
  }
  .demo-iframe-wrap iframe {
    width: 100%; height: 100%; min-height: 520px;
    border: none; display: block;
    border-radius: 16px;
  }
  .demo-label {
    position: absolute; top: 10px; right: 10px; z-index: 5;
    background: rgba(255,253,225,0.95);
    border: 1px solid #ffc107;
    border-radius: 99px; padding: 3px 12px;
    font-size: 0.7rem; color: #856404; font-weight: 500;
    pointer-events: none;
  }
  .preview-modal-placeholder {
    width: 100%; height: 260px;
    border-radius: 16px;
    background: linear-gradient(135deg, #fde8f0, #f0e8fd);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px;
  }
  .preview-modal-placeholder .emoji { font-size: 3.5rem; }
  .preview-modal-desc { margin-top: 14px; font-size: 0.86rem; color: var(--muted); line-height: 1.6; flex-shrink: 0; }
  .preview-modal-meta { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; flex-shrink: 0; }
  .close-btn {
    background: rgba(200,170,230,0.2); border: none; border-radius: 99px;
    width: 32px; height: 32px; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    color: var(--muted); transition: all 0.2s; flex-shrink: 0;
  }
  .close-btn:hover { background: #f9c6d0; color: #c050a0; }

  /* ─── STATS ─── */
  .stats-bar {
    display: flex; gap: 18px; flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 30px;
  }
  .stat-pill {
    background: var(--card-bg);
    border-radius: 99px;
    padding: 8px 20px;
    font-size: 0.8rem;
    color: #9070b0;
    border: 1.5px solid rgba(200,170,230,0.3);
    backdrop-filter: blur(8px);
    box-shadow: 0 2px 10px rgba(180,140,210,0.08);
    font-weight: 500;
  }
  .stat-pill span { font-weight: 700; color: #c070a0; }

  /* ─── COLOURS PER CATEGORY ─── */
  .cat-games    { --c: #f9c6d0; --ct: #c04070; }
  .cat-tools    { --c: #c4e4fd; --ct: #3070a0; }
  .cat-edu      { --c: #c6f0e0; --ct: #208060; }
  .cat-creative { --c: #fddcc4; --ct: #a05020; }
  .cat-other    { --c: #ddc6f9; --ct: #7040b0; }

  .card-band { background: var(--c); }
  .card-tag  { background: color-mix(in srgb, var(--c) 40%, white); color: var(--ct); }

  /* ─── TOAST ─── */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(30px);
    background: rgba(255,252,255,0.95);
    border-radius: 99px; padding: 10px 26px;
    box-shadow: 0 8px 30px rgba(180,140,210,0.25);
    border: 1.5px solid rgba(220,190,240,0.5);
    font-size: 0.85rem; color: #7050a0; font-weight: 500;
    z-index: 200; pointer-events: none;
    opacity: 0; transition: all 0.4s cubic-bezier(.34,1.56,.64,1);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .modal, .preview-modal { padding: 24px 18px; }
  }

  /* prevent text selection on cards to feel more app-like */
  .card { user-select: none; }
</style>
</head>
<body>

<div class="bg-canvas"></div>
<canvas id="sparkle-canvas"></canvas>

<div class="wrapper">
  <header>
    <span class="crown-emoji">🌸</span>
    <h1>AI Portfolio</h1>
    <p>A collection of magical AI artifacts, built with care ✨</p>
    <div class="header-line">
      <span class="pill-tag">✦ by Jee</span>
      <span class="pill-tag">Powered by Claude</span>
      <span class="pill-tag">🦋 Interactive</span>
    </div>
  </header>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-filter="all">✦ All</button>
    <button class="filter-btn" data-filter="games">🎮 Games</button>
    <button class="filter-btn" data-filter="tools">🔧 Tools</button>
    <button class="filter-btn" data-filter="edu">📚 Educational</button>
    <button class="filter-btn" data-filter="creative">🎨 Creative</button>
    <button class="filter-btn" data-filter="other">🌙 Other</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2 id="modal-title">✦ Add New Artifact</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="f-title" placeholder="My Amazing Tool">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="f-cat">
          <option value="games">🎮 Games</option>
          <option value="tools">🔧 Tools</option>
          <option value="edu">📚 Educational</option>
          <option value="creative">🎨 Creative</option>
          <option value="other">🌙 Other</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="f-desc" rows="2" placeholder="What does this artifact do?"></textarea>
    </div>
    <div class="form-group">
      <label>Preview Image URL <span style="color:#d0a0c0;font-size:0.7rem;">(optional — paste a screenshot link)</span></label>
      <input type="text" id="f-img" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Live Demo URL <span style="color:#a0c0d0;font-size:0.7rem;">(optional — hosted demo HTML link)</span></label>
      <input type="text" id="f-demo" placeholder="https://yoursite.com/demo.html">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Emoji Icon</label>
        <input type="text" id="f-emoji" placeholder="🤖" maxlength="4">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="visible">👁 Visible</option>
          <option value="hidden">🙈 Hidden</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-save" id="modal-save">Save Artifact ✨</button>
    </div>
  </div>
</div>

<!-- PREVIEW MODAL -->
<div class="modal-overlay" id="preview-modal">
  <div class="preview-modal">
    <div class="preview-modal-header">
      <div>
        <h2 id="pm-title">—</h2>
        <div class="preview-modal-meta" id="pm-meta"></div>
      </div>
      <button class="close-btn" id="preview-close">✕</button>
    </div>
    <div id="pm-visual"></div>
    <p class="preview-modal-desc" id="pm-desc"></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════
   DATA
════════════════════════════════════════ */
const CAT_META = {
  games:    { label: '🎮 Games',       cls: 'cat-games' },
  tools:    { label: '🔧 Tools',       cls: 'cat-tools' },
  edu:      { label: '📚 Educational', cls: 'cat-edu' },
  creative: { label: '🎨 Creative',    cls: 'cat-creative' },
  other:    { label: '🌙 Other',       cls: 'cat-other' },
};

let artifacts = JSON.parse(localStorage.getItem('ai-portfolio') || 'null') || [
  { id: uid(), title: 'IA Work Planner',            cat: 'tools',    emoji: '📋', desc: 'Internal audit work tracking dashboard — task priorities, reminders, sub-tasks, progress & mini calendar. Built for retail IA teams.', img: '', demo: 'ia-work-planner-demo.html', status: 'visible' },
  { id: uid(), title: 'Detection Range Calculator', cat: 'games',    emoji: '🎯', desc: 'Interactive military detection range calculator for Broken Arrow game environment.',    img: '', demo: '', status: 'visible' },
  { id: uid(), title: 'Rubiks Cube Simulator',      cat: 'games',    emoji: '🧩', desc: '3D interactive Rubiks Cube with rotation controls and classic puzzle mechanics.',        img: '', demo: '', status: 'visible' },
  { id: uid(), title: 'Puyo Puyo Game',             cat: 'games',    emoji: '🫧', desc: 'Classic puzzle game with falling colored blobs that clear when matched in groups.',       img: '', demo: '', status: 'visible' },
  { id: uid(), title: 'Space Invaders Retro',       cat: 'games',    emoji: '👾', desc: 'Classic retro-style space invaders arcade game with pixel graphics and escalating waves.',img: '', demo: '', status: 'visible' },
  { id: uid(), title: 'Tetris Game',                cat: 'games',    emoji: '🟦', desc: 'Classic Tetris puzzle game with falling tetrominoes and line clearing mechanics.',        img: '', demo: '', status: 'visible' },

  { id: uid(), title: 'SP1 Hypercube Adventure',   cat: 'edu',      emoji: '🧠', desc: 'Educational Mario-style platformer teaching zero-knowledge proofs through gameplay.',     img: '', demo: '', status: 'visible' },
  { id: uid(), title: 'Double Pendulum Simulation', cat: 'edu',      emoji: '〰️', desc: 'Interactive physics simulation showing chaotic motion of double pendulum systems.',      img: '', demo: '', status: 'visible' },
  { id: uid(), title: 'ASCII Explosion Generator',  cat: 'creative', emoji: '💥', desc: '3D ASCII art explosion effects generator with customizable styles and animations.',       img: '', demo: '', status: 'visible' },
  { id: uid(), title: 'Three.js Blackjack Game',   cat: 'games',    emoji: '🃏', desc: '3D casino-style blackjack game with realistic table, card physics and animations.',       img: '', demo: '', status: 'visible' },
];

let editingId = null;
let activeFilter = 'all';

function uid() { return Math.random().toString(36).slice(2, 10); }
function save() { localStorage.setItem('ai-portfolio', JSON.stringify(artifacts)); }

/* ════════════════════════════════════════
   RENDER
════════════════════════════════════════ */
function render() {
  const grid = document.getElementById('grid');
  const filtered = activeFilter === 'all'
    ? artifacts
    : artifacts.filter(a => a.cat === activeFilter);

  // stats
  const total   = artifacts.length;
  const visible = artifacts.filter(a => a.status === 'visible').length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-pill">Total <span>${total}</span></div>
    <div class="stat-pill">Visible <span>${visible}</span></div>
    <div class="stat-pill">Hidden <span>${total - visible}</span></div>
  `;

  let html = '';
  filtered.forEach((a, i) => {
    const m   = CAT_META[a.cat] || CAT_META.other;
    const img = a.img ? `<img src="${escHtml(a.img)}" alt="" draggable="false" oncontextmenu="return false" ondragstart="return false">` :
      `<div class="preview-placeholder"><div class="emoji">${a.emoji || '✨'}</div><span>${a.demo ? '▶ Live demo available' : 'preview unavailable'}</span></div>`;
    const hiddenCls = a.status === 'hidden' ? ' hidden-card' : '';
    const eyeIcon   = a.status === 'hidden' ? '🙈' : '👁';
    const demoBadge = a.demo ? `<div style="position:absolute;bottom:10px;left:10px;z-index:6;background:rgba(200,240,220,0.95);border:1px solid #80c0a0;border-radius:99px;padding:3px 10px;font-size:0.65rem;font-weight:600;color:#207050;letter-spacing:0.3px;">▶ LIVE</div>` : '';

    html += `
    <div class="card ${m.cls}${hiddenCls}" data-id="${a.id}" style="animation-delay:${i * 0.055}s">
      <div class="card-band"></div>
      <div class="card-preview">
        ${img}
        <div class="card-badge">${m.label}</div>
        ${demoBadge}
        <div class="preview-lock" data-preview="${a.id}" title="Click to preview"></div>
      </div>
      <div class="card-body">
        <div class="card-title">${a.emoji ? a.emoji + ' ' : ''}${escHtml(a.title)}</div>
        <div class="card-desc">${escHtml(a.desc)}</div>
        <div class="card-footer">
          <span class="card-tag">${m.label}</span>
          <div class="card-actions">
            <button class="btn-icon" data-toggle="${a.id}" title="Show/Hide">${eyeIcon}</button>
            <button class="btn-icon" data-edit="${a.id}" title="Edit">✏️</button>
            <button class="btn-icon danger" data-del="${a.id}" title="Remove">🗑</button>
          </div>
        </div>
      </div>
    </div>`;
  });

  // Add card
  html += `
  <div class="card card-add" id="btn-add">
    <div class="add-icon">+</div>
    <span>Add Artifact</span>
  </div>`;

  grid.innerHTML = html;
  attachCardEvents();
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function attachCardEvents() {
  document.getElementById('btn-add').addEventListener('click', openAddModal);

  document.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.del;
      artifacts = artifacts.filter(a => a.id !== id);
      save(); render(); spawnBurst();
      toast('Artifact removed 🌙');
    });
  });

  document.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openEditModal(btn.dataset.edit);
    });
  });

  document.querySelectorAll('[data-toggle]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const a = artifacts.find(a => a.id === btn.dataset.toggle);
      if (a) { a.status = a.status === 'visible' ? 'hidden' : 'visible'; save(); render(); }
    });
  });

  document.querySelectorAll('[data-preview]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); openPreview(el.dataset.preview); });
  });
}

/* ════════════════════════════════════════
   FILTER
════════════════════════════════════════ */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

/* ════════════════════════════════════════
   ADD / EDIT MODAL
════════════════════════════════════════ */
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '✦ Add New Artifact';
  document.getElementById('f-title').value  = '';
  document.getElementById('f-desc').value   = '';
  document.getElementById('f-img').value    = '';
  document.getElementById('f-demo').value   = '';
  document.getElementById('f-emoji').value  = '';
  document.getElementById('f-cat').value    = 'tools';
  document.getElementById('f-status').value = 'visible';
  document.getElementById('add-modal').classList.add('open');
}

function openEditModal(id) {
  const a = artifacts.find(a => a.id === id);
  if (!a) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '✦ Edit Artifact';
  document.getElementById('f-title').value  = a.title;
  document.getElementById('f-desc').value   = a.desc;
  document.getElementById('f-img').value    = a.img;
  document.getElementById('f-demo').value   = a.demo || '';
  document.getElementById('f-emoji').value  = a.emoji || '';
  document.getElementById('f-cat').value    = a.cat;
  document.getElementById('f-status').value = a.status;
  document.getElementById('add-modal').classList.add('open');
}

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('add-modal').classList.remove('open');
});

document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('add-modal'))
    document.getElementById('add-modal').classList.remove('open');
});

document.getElementById('modal-save').addEventListener('click', () => {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('Please enter a title 🌸'); return; }
  const data = {
    title,
    cat:    document.getElementById('f-cat').value,
    desc:   document.getElementById('f-desc').value.trim(),
    img:    document.getElementById('f-img').value.trim(),
    demo:   document.getElementById('f-demo').value.trim(),
    emoji:  document.getElementById('f-emoji').value.trim(),
    status: document.getElementById('f-status').value,
  };
  if (editingId) {
    const a = artifacts.find(a => a.id === editingId);
    Object.assign(a, data);
    toast('Artifact updated ✨');
  } else {
    artifacts.push({ id: uid(), ...data });
    toast('Artifact added 🌸');
    spawnBurst();
  }
  save(); render();
  document.getElementById('add-modal').classList.remove('open');
});

/* ════════════════════════════════════════
   PREVIEW MODAL
════════════════════════════════════════ */
function openPreview(id) {
  const a = artifacts.find(a => a.id === id);
  if (!a) return;
  const m = CAT_META[a.cat] || CAT_META.other;
  document.getElementById('pm-title').textContent = (a.emoji ? a.emoji + ' ' : '') + a.title;
  document.getElementById('pm-desc').textContent  = a.desc || 'No description provided.';
  document.getElementById('pm-meta').innerHTML    = `
    <span class="card-tag ${m.cls}">${m.label}</span>
    <span class="pill-tag">${a.status === 'hidden' ? '🙈 Hidden' : '👁 Visible'}</span>
    ${a.demo ? '<span class="pill-tag" style="background:rgba(200,240,220,0.7);color:#207050;border-color:#80c0a0;">▶ Live Demo</span>' : ''}
  `;
  const vis = document.getElementById('pm-visual');
  if (a.demo) {
    vis.innerHTML = `
      <div class="demo-iframe-wrap">
        <div class="demo-label">✦ DEMO — read only preview</div>
        <iframe src="${escHtml(a.demo)}" sandbox="allow-scripts allow-same-origin" loading="lazy"></iframe>
      </div>`;
  } else if (a.img) {
    vis.innerHTML = `<img class="preview-modal-img" src="${escHtml(a.img)}" alt="" draggable="false" oncontextmenu="return false" ondragstart="return false" style="pointer-events:none;">`;
  } else {
    vis.innerHTML = `<div class="preview-modal-placeholder"><div class="emoji">${a.emoji || '✨'}</div><p style="font-size:0.8rem;color:var(--muted)">No preview added yet.<br>Edit the artifact to add an image URL or demo link.</p></div>`;
  }
  document.getElementById('preview-modal').classList.add('open');
}

document.getElementById('preview-close').addEventListener('click', () => {
  document.getElementById('preview-modal').classList.remove('open');
  document.getElementById('pm-visual').innerHTML = ''; // stop iframe
});
document.getElementById('preview-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('preview-modal')) {
    document.getElementById('preview-modal').classList.remove('open');
    document.getElementById('pm-visual').innerHTML = '';
  }
});

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

/* ════════════════════════════════════════
   SPARKLE CANVAS
════════════════════════════════════════ */
const canvas  = document.getElementById('sparkle-canvas');
const ctx     = canvas.getContext('2d');
let sparkles  = [];
let W, H;

function resizeCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const COLORS = ['#f9c6d0','#ddc6f9','#c4e4fd','#c6f0e0','#fddcc4','#fde8f0'];

document.addEventListener('mousemove', e => {
  if (Math.random() > 0.55) return;
  for (let i = 0; i < 2; i++) {
    sparkles.push({
      x: e.clientX + (Math.random()-0.5)*20,
      y: e.clientY + (Math.random()-0.5)*20,
      r: Math.random()*3+1,
      vx: (Math.random()-0.5)*1.5,
      vy: (Math.random()-0.5)*1.5 - 1.2,
      life: 1,
      decay: 0.022 + Math.random()*0.025,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      rot: Math.random()*Math.PI*2,
      star: Math.random() > 0.5,
    });
  }
});

function drawStar(x, y, r, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * Math.PI*2/5) - Math.PI/2;
    const b = a + Math.PI/5;
    i === 0 ? ctx.moveTo(x + Math.cos(a)*r, y + Math.sin(a)*r)
             : ctx.lineTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
    ctx.lineTo(x + Math.cos(b)*r*0.4, y + Math.sin(b)*r*0.4);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function spawnBurst() {
  const cx = W/2, cy = H/2;
  for (let i = 0; i < 28; i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = Math.random()*4+2;
    sparkles.push({
      x: cx, y: cy,
      r: Math.random()*4+2,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life: 1, decay: 0.015+Math.random()*0.02,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      star: true,
    });
  }
}

function animSparkles() {
  ctx.clearRect(0, 0, W, H);
  sparkles = sparkles.filter(s => s.life > 0);
  sparkles.forEach(s => {
    s.x += s.vx; s.y += s.vy;
    s.vy += 0.04;
    s.life -= s.decay;
    if (s.star) drawStar(s.x, s.y, s.r, s.color, s.life);
    else {
      ctx.save();
      ctx.globalAlpha = s.life;
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  });
  requestAnimationFrame(animSparkles);
}
animSparkles();

/* ════════════════════════════════════════
   BUTTERFLIES
════════════════════════════════════════ */
const BF_COLORS = [
  ['#f9c6d0','#e880a8'],
  ['#ddc6f9','#a060d0'],
  ['#c4e4fd','#6090d0'],
  ['#c6f0e0','#40b080'],
  ['#fddcc4','#e09040'],
];

function createButterfly() {
  const el   = document.createElement('div');
  el.className = 'butterfly';
  const pair = BF_COLORS[Math.floor(Math.random()*BF_COLORS.length)];
  const size = 24 + Math.random()*24;
  const dur  = 9 + Math.random()*14;
  const sx   = Math.random()*window.innerWidth;
  const sy   = Math.random()*window.innerHeight;
  const dx   = (Math.random()-0.5)*500;
  const dy   = (Math.random()-0.5)*400;
  const dx2  = (Math.random()-0.5)*600;
  const dy2  = (Math.random()-0.5)*500;
  const dr   = (Math.random()-0.5)*60 + 'deg';
  const dr2  = (Math.random()-0.5)*80 + 'deg';
  const ds   = 0.8 + Math.random()*0.5;

  el.style.cssText = `
    left:${sx}px; top:${sy}px;
    --dx:${dx}px; --dy:${dy}px; --dr:${dr}; --ds:${ds};
    --dx2:${dx2}px; --dy2:${dy2}px; --dr2:${dr2};
    animation-duration:${dur}s;
    animation-delay:${Math.random()*8}s;
  `;

  el.innerHTML = `
  <svg width="${size}" height="${size*0.75}" viewBox="0 0 60 45" fill="none" xmlns="http://www.w3.org/2000/svg">
    <g class="wing-l">
      <ellipse cx="18" cy="16" rx="18" ry="14" fill="${pair[0]}" opacity="0.88"/>
      <ellipse cx="14" cy="30" rx="12" ry="9"  fill="${pair[0]}" opacity="0.75"/>
    </g>
    <g class="wing-r" style="transform-origin:30px 22px">
      <ellipse cx="42" cy="16" rx="18" ry="14" fill="${pair[1]}" opacity="0.88"/>
      <ellipse cx="46" cy="30" rx="12" ry="9"  fill="${pair[1]}" opacity="0.75"/>
    </g>
    <ellipse cx="30" cy="22" rx="3" ry="11" fill="#7a5090" opacity="0.6"/>
  </svg>`;

  document.body.appendChild(el);

  el.addEventListener('animationend', () => {
    el.remove();
    createButterfly();
  });
}

// Spawn initial butterflies
for (let i = 0; i < 7; i++) setTimeout(createButterfly, i * 1200);
// Periodic spawn
setInterval(createButterfly, 5000);

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
render();
</script>
